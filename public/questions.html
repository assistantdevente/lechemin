      ],
      'F-D': [
        { titre: 'Les racines et les origines', texte: "Aujourd'hui, quel est le mot qui résume ta relation à tes racines ?", options: ["Transmission — je porte et je passe", "Réconciliation — j'ai fait la paix avec ce qui a été", "Exploration — je découvre encore des couches insoupçonnées", "Gratitude — même pour ce qui a été difficile"] },
        { titre: 'Les choix de vie', texte: "En regardant ta vie, quelle est la chose dont tu es la plus fière ?", options: ["D'avoir suivi ma propre voie malgré les pressions", "D'avoir su me relever à chaque épreuve", "Des liens que j'ai construits et nourris", "De la femme que je suis devenue"] },
        { titre: 'Les épreuves et la résilience', texte: "Qu'est-ce que les grandes épreuves t'ont finalement apporté ?", options: ["Une profondeur que je n'aurais pas eue autrement", "Une capacité à relativiser et à lâcher prise", "Une compassion plus grande pour moi et les autres", "Une clarté sur ce qui compte vraiment"] },
        { titre: 'Les relations et les liens', texte: "Qu'est-ce que les relations t'ont appris sur toi-même ?", options: ["Que j'ai besoin de peu mais de profond", "Que j'ai parfois trop donné sans recevoir", "Que l'amour, sous toutes ses formes, est ce qui compte le plus", "Que certaines solitudes sont aussi une forme de liberté"] },
        { titre: "L'identité et le sens de soi", texte: "Aujourd'hui, qui es-tu, profondément ?", options: ["Une femme qui a trouvé sa paix intérieure", "Une femme encore en mouvement et en curiosité", "Une femme qui transmet et qui relie", "Une femme qui continue de se découvrir"] },
        { titre: 'Les rêves et les aspirations', texte: "Qu'est-ce qui te fait encore vibrer et t'aspire vers l'avant ?", options: ["La beauté des choses simples", "La possibilité de continuer à apprendre", "Les liens et la transmission", "Un dernier grand oui à la vie"] },
        { titre: 'Le rapport au temps et au présent', texte: "Quel est ton mot pour ce rapport au temps, aujourd'hui ?", options: ["Plénitude — je suis là, vraiment", "Urgence douce — je veux encore tant vivre", "Paix — j'ai cessé de courir", "Gratitude — chaque jour est un privilège"] },
        { titre: 'Le chemin à venir', texte: "Quel est le vœu le plus profond que tu portes pour la suite de ton chemin ?", options: ["Continuer à grandir et à m'étonner", "Laisser quelque chose de beau derrière moi", "Vivre chaque jour avec présence et gratitude", "Être enfin en paix avec qui je suis"] }
      ]
    };

    const code = getCode();
    const questions = QUESTIONS[code] || QUESTIONS['F-B'];
    const reponses = new Array(questions.length).fill(null);

    function buildQuestionnaire() {
      const div = document.getElementById('questionnaire');
      questions.forEach((q, i) => {
        const bloc = document.createElement('div');
        bloc.className = 'question-bloc';
        bloc.innerHTML = `<div class="q-num">${q.titre} — Question ${i + 1} / ${questions.length}</div><div class="q-texte">${q.texte}</div><div class="options" id="opts-${i}">${q.options.map((o, j) => `<div class="option" id="opt-${i}-${j}" onclick="choisir(${i},${j},'${o.replace(/'/g,"\\'")}')"><div class="radio-custom"><div class="radio-dot"></div></div><span class="option-label">${o}</span></div>`).join('')}</div>`;
        div.appendChild(bloc);
      });
    }

    function choisir(qi, oi, valeur) {
      document.querySelectorAll(`#opts-${qi} .option`).forEach(el => el.classList.remove('selected'));
      document.getElementById(`opt-${qi}-${oi}`).classList.add('selected');
      reponses[qi] = valeur;
    }

    function majCompteur() {
      document.getElementById('compteur').textContent = `${document.getElementById('texteLibre').value.length} / 500`;
    }

    function continuer() {
      const prenom = document.getElementById('prenom').value.trim();
      const nom = document.getElementById('nom').value.trim().toUpperCase();
      const tl = document.getElementById('texteLibre').value.trim();
      const email = document.getElementById('email').value.trim();
      const msg = document.getElementById('message');
      if (!prenom) return msg.textContent = 'Veuillez entrer votre prénom.';
      if (nom.length < 2) return msg.textContent = 'Veuillez entrer au moins 2 lettres de votre nom.';
      if (reponses.includes(null)) return msg.textContent = 'Veuillez répondre à toutes les questions.';
      if (tl.length < 50) return msg.textContent = 'Le texte libre doit faire au moins 50 caractères.';
      if (!email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) return msg.textContent = 'Veuillez entrer un email valide.';
      localStorage.setItem('dlm_prenom', prenom);
      localStorage.setItem('dlm_nom', nom);
      localStorage.setItem('dlm_reponses', JSON.stringify(reponses));
      localStorage.setItem('dlm_questions', JSON.stringify(questions.map(q => q.titre)));
      localStorage.setItem('dlm_texte', tl);
      localStorage.setItem('dlm_email', email);
      localStorage.setItem('dlm_reference', `LECHEMIN ${prenom} ${nom}`);
      window.location.href = 'paiement.html';
    }

    buildQuestionnaire();
  </script>
</body>
</html>
